services:
  db:
    image: postgis/postgis:16-3.4
    container_name: qiyaf_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: qiyaf_db
    ports:
      - "5432:5432"
    volumes:
      - qiyaf_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: qiyaf_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: qiyaf_api
    network_mode: host
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:password123@127.0.0.1:5432/qiyaf_db
      - REDIS_URL=redis://127.0.0.1:6379/0

  worker:
    build: .
    container_name: qiyaf_worker
    network_mode: host
    command: celery -A app.core.celery_config.celery_app worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:password123@127.0.0.1:5432/qiyaf_db
      - REDIS_URL=redis://127.0.0.1:6379/0

volumes:
  qiyaf_postgres_data: