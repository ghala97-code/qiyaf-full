services:
  db:
    image: postgis/postgis:16-3.4
    container_name: qiyaf_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: qiyaf_db
    ports:
      - "5432:5432"
    volumes:
      - qiyaf_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: qiyaf_redis
    restart: always

  api:
    build: .
    container_name: qiyaf_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: qiyaf_worker
    command: celery -A app.core.celery_config.celery_app worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

volumes:
  qiyaf_postgres_data: